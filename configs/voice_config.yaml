# Voice clone project settings

speaker:
  name: "my_voice"
  language: "zh"          # GPT-SoVITS: zh, yue, en, ja, ko
  asr_language: "zh"      # faster-whisper language code

paths:
  raw_dir: "data/raw"
  sliced_dir: "data/sliced"
  transcript_dir: "data/transcripts"
  reference_dir: "data/reference"
  output_dir: "output"
  models_dir: "models"
  gptsovits_dir: "GPT-SoVITS"

preprocess:
  sample_rate: 16000
  channels: 1
  min_segment_sec: 3.0
  max_segment_sec: 12.0
  target_dbfs: -23.0
  silence_threshold_db: -40
  silence_min_ms: 350
  keep_silence_ms: 180
  min_dbfs: -38.0
  max_dbfs: -12.0
  overwrite: true

transcribe:
  model_size: "large-v3"
  device: "cuda"          # use cpu when no NVIDIA GPU is available
  compute_type: "float16" # cpu usually needs int8
  beam_size: 5
  vad_filter: true
  confidence_threshold: -0.80
  min_text_chars: 2

quality:
  min_valid_segments: 100
  good_valid_segments: 300
  min_total_minutes: 30
  good_total_minutes: 60

reference:
  preferred_min_sec: 5.0
  preferred_max_sec: 10.0
  preferred_min_chars: 8
  preferred_max_chars: 60
  audio: "data/reference/ref.wav"
  text_file: "data/reference/ref.txt"

training:
  exp_name: "my_voice"
  sovits_epochs: 8
  gpt_epochs: 15
  batch_size: 4
  save_every_epoch: 4

inference:
  sovits_model_path: "models/sovits_model.pth"
  gpt_model_path: "models/gpt_model.ckpt"
  reference_audio: "data/reference/ref.wav"
  reference_text: ""
  top_k: 5
  top_p: 1.0
  temperature: 0.8
  speed_factor: 1.0
  text_split_method: "cut5"
  output_format: "wav"
